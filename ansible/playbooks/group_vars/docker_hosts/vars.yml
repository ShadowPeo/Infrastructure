---
# Docker hosts require IP forwarding for container networking.
# sysctl_overwrite merges with devsec's sysctl_config rather than replacing it.
sysctl_overwrite:
  net.ipv4.ip_forward: 1
  net.ipv6.conf.all.forwarding: 1

# UFW drops forwarded packets by default which breaks Docker networking.
ufw_default_forward_policy: ACCEPT

# Reduce default Docker subnet allocation from /16 to /28.
# Base 172.31.0.0/22 covers 172.31.0-3.x (1024 addresses), carved into
# 64 x /28 networks (14 usable container IPs each) for auto-created networks.
# Named networks use explicit subnets in 172.31.241.x/254.x — no overlap.
docker_daemon_options:
  default-address-pools:
    - base: "172.31.0.0/22"
      size: 28

# Standard networks created on every Docker host.
# Apps attach to these by name rather than creating ad-hoc networks per stack.
# Override in a site's group_vars if a host needs a different set.
docker_networks:
  - name: Apprise
    subnet: "172.31.241.0/26"
    iprange: "172.31.241.0/26"
    gateway: "172.31.241.1"
  - name: Adminer
    subnet: "172.31.241.128/26"
    iprange: "172.31.241.128/26"
    gateway: "172.31.241.129"
  - name: Public
    subnet: "172.31.254.0/24"
    iprange: "172.31.254.0/24"
    gateway: "172.31.254.1"
