---
# Docker service user registry — Core (Groups 1–3)
# Present on every docker host regardless of site.
# Range: 6000–6399
#
# Convention:
#   - Each app gets a block of 5 UIDs (e.g. 6100–6104)
#   - Container 0 = primary app, 1-4 = sidecars/addons in same stack
#   - Large stacks that need >5 allocate from the TOP of their band downward
#   - UIDs are fixed — never reassign or reuse a vacated UID
#   - Databases/caches using named volumes do NOT need a host UID
#   - GID always matches UID for simplicity

# Admin group — members get group write access to docker data directories
# where direct filesystem access is needed (e.g. paperless consume/export)
acl_docker_data_admin_gid: 6000

# ── Group 1: Container & host management (6100–6199) ──────────────────────────
docker_service_users:

  # 6100 arcane (container management hub)
  arcane:         { uid: 6100 }

  # 6105 portainer (container management — EE, legacy)
  portainer:      { uid: 6105 }

  # 6110 dozzle (log viewer)
  dozzle:         { uid: 6110 }

  # 6115 scrutiny (SMART monitoring)
  scrutiny:       { uid: 6115 }

  # 6120 beszel (system metrics)
  beszel:         { uid: 6120 }

  # 6125 watchtower (auto-updater)
  watchtower:     { uid: 6125 }

  # 6130 uptime_kuma (uptime monitoring)
  uptime_kuma:    { uid: 6130 }

  # 6135 healthchecks (cron/job monitoring)
  healthchecks:   { uid: 6135 }

  # 6140 grafana (metrics dashboards)
  grafana:        { uid: 6140 }

  # 6145 wazuh (SIEM — manager=6145, indexer=6146, dashboard=6147)
  wazuh:          { uid: 6145 }
  wazuh_indexer:  { uid: 6146 }
  wazuh_dashboard: { uid: 6147 }

  # 6150 adminer (database admin UI)
  adminer:        { uid: 6150 }

  # 6155 velld (database backup)
  velld:          { uid: 6155 }

# ── Group 2: Network & infrastructure (6200–6299) ─────────────────────────────

  # 6200 traefik (reverse proxy)
  traefik:        { uid: 6200 }

  # 6205 crowdsec (intrusion prevention)
  crowdsec:       { uid: 6205 }

  # 6210 technitium (DNS)
  technitium:     { uid: 6210 }

  # 6215 netbox (network documentation/IPAM)
  netbox:         { uid: 6215 }

  # 6220 phpipam (IP address management)
  phpipam:        { uid: 6220 }

  # 6225 unimus (network device config backup)
  unimus:         { uid: 6225 }

  # 6230 pgbackweb (postgres backup UI)
  pgbackweb:      { uid: 6230 }

  # 6235 ofelia (cron job scheduler)
  ofelia:         { uid: 6235 }

  # 6240 semaphore (Ansible UI/CI)
  semaphore:      { uid: 6240 }

  # 6245 stalwart (internal mail plumbing)
  stalwart:       { uid: 6245 }

# ── Group 3: Identity & auth (6300–6399) ──────────────────────────────────────
# Intentionally sparse — room for kanidm, keycloak etc.

  # 6300 authentik
  authentik:      { uid: 6300 }

  # 6305 lldap
  lldap:          { uid: 6305 }
