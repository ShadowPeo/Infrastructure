---
# Bootstrap playbook - run once on a new host to set up managed users,
# deploy SSH keys, configure sudo, and harden SSH.
#
# Run in two phases to avoid losing SSH access mid-play:
#
#   Phase 1 - as break-glass account, password auth:
#     ansible-playbook bootstrap.yml -u sysadmin -k -K --skip-tags hardening
#
#   Phase 2 - as your own account or ansible service account, key auth:
#     ansible-playbook bootstrap.yml --tags hardening
#
# Expected variables (define in group_vars/all/users.yml):
#   managed_users:        list of user objects (see below)
#   user_optional_groups: list of groups applied to all users if they exist on the host
#   managed_groups:       list of ACL groups to create
#
# User object fields:
#   username:   (required) login name
#   uid:        (optional) numeric UID - only applied on creation, never changed
#   gid:        (optional) numeric primary GID - only applied on creation, never changed
#   fullname:   (optional) GECOS comment field
#   sudo:       (optional) true = passwordless sudoers.d entry
#   groups:     (optional) list of extra groups beyond user_optional_groups
#   ssh_keys:   (optional) list of authorised public keys
#   state:      (optional) present (default) or absent

- name: Bootstrap host
  hosts: all
  become: true

  pre_tasks:
    - name: Gather host group memberships
      ansible.builtin.getent:
        database: group
      tags: [users, hardening]

    - name: Gather existing users
      ansible.builtin.getent:
        database: passwd
      tags: [users]

    - name: Create ACL groups
      ansible.builtin.group:
        name: "{{ item.name }}"
        gid: "{{ item.gid | default(omit) }}"
        state: present
      loop: "{{ managed_groups | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [users]

    - name: Create primary groups for new users
      ansible.builtin.group:
        name: "{{ item.username }}"
        gid: "{{ item.gid | default(omit) }}"
        state: present
      when: item.username not in ansible_facts.getent_passwd
      loop: "{{ managed_users }}"
      loop_control:
        label: "{{ item.username }}"
      tags: [users]

    - name: Create new managed users (with UID/GID)
      ansible.builtin.user:
        name: "{{ item.username }}"
        uid: "{{ item.uid | default(omit) }}"
        group: "{{ item.username }}"
        comment: "{{ item.fullname | default(omit) }}"
        shell: /bin/bash
        create_home: true
        state: "{{ item.state | default('present') }}"
      when: item.username not in ansible_facts.getent_passwd
      loop: "{{ managed_users }}"
      loop_control:
        label: "{{ item.username }}"
      tags: [users]

    - name: Update existing users (shell, comment only - never change UID)
      ansible.builtin.user:
        name: "{{ item.username }}"
        comment: "{{ item.fullname | default(omit) }}"
        shell: /bin/bash
        state: "{{ item.state | default('present') }}"
      when: item.username in ansible_facts.getent_passwd
      loop: "{{ managed_users }}"
      loop_control:
        label: "{{ item.username }}"
      tags: [users]

    - name: Add users to optional groups (if group exists on this host)
      ansible.builtin.user:
        name: "{{ item.0.username }}"
        groups: "{{ item.1 }}"
        append: true
      when:
        - item.0.state | default('present') == 'present'
        - item.1 in ansible_facts.getent_group
      loop: "{{ managed_users | product(user_optional_groups | default([])) | list }}"
      loop_control:
        label: "{{ item.0.username }} -> {{ item.1 }}"
      tags: [users]

    - name: Add per-user extra groups
      ansible.builtin.user:
        name: "{{ item.0.username }}"
        groups: "{{ item.1 }}"
        append: true
      when: item.0.state | default('present') == 'present'
      loop: "{{ managed_users | subelements('groups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.username }} -> {{ item.1 }}"
      tags: [users]

    - name: Deploy SSH authorized keys
      ansible.posix.authorized_key:
        user: "{{ item.0.username }}"
        key: "{{ item.1 }}"
        state: present
        exclusive: false
      when: item.0.state | default('present') == 'present'
      loop: "{{ managed_users | subelements('ssh_keys', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.username }}"
      tags: [users]

    - name: Configure passwordless sudo for admin users
      ansible.builtin.lineinfile:
        path: "/etc/sudoers.d/{{ item.username }}"
        line: "{{ item.username }} ALL=(ALL) NOPASSWD:ALL"
        create: true
        mode: '0440'
        validate: 'visudo -cf %s'
      loop: "{{ managed_users }}"
      loop_control:
        label: "{{ item.username }}"
      when: item.sudo | default(false)
      tags: [users]

  roles:
    - role: devsec.hardening.ssh_hardening
      tags: [hardening]
