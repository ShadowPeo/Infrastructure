---
# Bootstrap playbook - run ONCE on a new host as the break-glass account with password auth.
# Creates managed users and deploys SSH keys so subsequent runs can use key auth.
# After this completes, switch to key auth and run provision.yml for everything else.
#
# Usage:
#   ansible-playbook playbooks/bootstrap.yml -i <inventory> -u sysadmin -k -K
#
# For ongoing user management (key rotation, new users, removals) run users.yml directly
# or let Semaphore trigger it on commit.

- import_playbook: users.yml
