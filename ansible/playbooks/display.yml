---
# Configure display/kiosk hosts and Raspberry Pi seat management.
#
# Play 1 targets all Raspberry Pi hosts: devsec PAM hardening breaks logind
# VT session activation, preventing Wayland compositors from calling
# TakeControl(). seatd provides a simpler seat management path unaffected
# by this. Applies to all Pis, not just display hosts, as any Pi running
# a Wayland compositor would hit the same issue.
#
# Play 2 targets display_hosts: suppresses the gnome-keyring 'Default Keyring'
# password prompt in Chromium on autologin kiosk sessions.
#
# Usage:
#   ansible-playbook playbooks/display.yml -i <inventory>
#   ansible-playbook playbooks/display.yml -i <inventory> --limit DISP-ITOFF

- name: Configure seatd on Raspberry Pi hosts
  hosts: raspberry_pi
  become: true

  tasks:
    - name: Install seatd
      ansible.builtin.apt:
        name: seatd
        state: present

    - name: Enable and start seatd service
      ansible.builtin.systemd:
        name: seatd
        enabled: true
        state: started

    - name: Set LIBSEAT_BACKEND=seatd in system environment
      ansible.builtin.lineinfile:
        path: /etc/environment
        regexp: '^LIBSEAT_BACKEND='
        line: 'LIBSEAT_BACKEND=seatd'
        state: present

    - name: Add managed users to seat group
      ansible.builtin.user:
        name: "{{ item.username }}"
        groups: seat
        append: true
      loop: "{{ managed_users | rejectattr('state', 'equalto', 'absent') | list }}"
      loop_control:
        label: "{{ item.username }}"

- name: Configure Chromium on display hosts
  hosts: display_hosts
  become: true

  tasks:
    # Suppress gnome-keyring 'Default Keyring' prompt on autologin kiosk sessions.
    # PAM does not unlock the keyring without password auth, causing Chromium to
    # prompt on every start. Switching to the basic password store removes the
    # gnome-keyring dependency entirely.

    - name: Check if Chromium config directory exists
      ansible.builtin.stat:
        path: /etc/chromium.d
      register: chromium_d

    - name: Suppress gnome-keyring prompt in Chromium
      ansible.builtin.copy:
        dest: /etc/chromium.d/kiosk
        content: "--password-store=basic\n"
        owner: root
        group: root
        mode: '0644'
      when: chromium_d.stat.exists
