---
# Full new-host provisioning chain.
# Run after bootstrap.yml completes (users and keys already in place).
# Runs maintenance first, then hardens, then installs the app stack.
# Hosts not in docker_hosts or tailscale groups are silently skipped for those plays.
#
# Usage:
#   ansible-playbook playbooks/provision.yml -i <inventory> -e reboot_on_completion=false

- import_playbook: users.yml
- import_playbook: maintenance.yml
- import_playbook: vm-guest-tools.yml
- import_playbook: ntp.yml
- import_playbook: harden.yml
- import_playbook: users.yml   # Re-run after hardening — os_hardening sets nologin on system UIDs (<1000), which breaks the ansible service account
- import_playbook: docker.yml
- import_playbook: netbird.yml
- import_playbook: cockpit.yml
- import_playbook: display.yml
- import_playbook: motd.yml
- import_playbook: reboot.yml
