---
# Display key facts about target hosts
# Usage: ansible-playbook playbooks/facts.yml
#        ansible-playbook playbooks/facts.yml --limit docker_hosts

- name: Gather host information
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Show key facts
      ansible.builtin.debug:
        msg:
          - "Hostname:    {{ ansible_hostname }}"
          - "OS:          {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "Kernel:      {{ ansible_kernel }}"
          - "CPU cores:   {{ ansible_processor_vcpus }}"
          - "RAM:         {{ (ansible_memtotal_mb / 1024) | round(1) }} GB"
          - "Disk (root): {{ (ansible_mounts | selectattr('mount', 'equalto', '/') | list | first).size_total | human_readable }}"
          - "IP address:  {{ ansible_default_ipv4.address }}"
          - "Uptime:      {{ (ansible_uptime_seconds / 3600) | round(1) }} hours"
