[defaults]
# No default inventory - always pass -i <site>/iac/ansible/inventory/ explicitly.
# This repo contains platform playbooks consumed by all site inventories.
roles_path            = roles:~/Git/Work/ansible/roles:~/.ansible/roles
remote_user           = ansible
host_key_checking     = False
vars_plugins_enabled  = host_group_vars,community.sops.sops

[privilege_escalation]
become        = True
become_method = sudo

[community.sops]
# Recognise plain .yml/.yaml in group_vars/host_vars (not just .sops.yml).
# Matches the project's existing secrets.yml naming convention.
valid_extensions          = .sops.yml,.sops.yaml,.sops.json,.yml,.yaml
# Plain YAML (vars.yml etc.) lacks SOPS metadata — skip cleanly instead of erroring.
# Requires SOPS >= 3.9.0 (we're on 3.13.1).
handle_unencrypted_files  = skip
