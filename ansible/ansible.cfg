[defaults]
# No default inventory - always pass -i <site>/iac/ansible/inventory/ explicitly.
# This repo contains platform playbooks consumed by all site inventories.
roles_path            = roles:~/Git/Work/ansible/roles:~/.ansible/roles
remote_user           = ansible
host_key_checking     = False
vars_plugins_enabled  = host_group_vars,community.sops.sops

[privilege_escalation]
become        = True
become_method = sudo
