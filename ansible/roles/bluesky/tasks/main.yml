- name: Include vault
  include_vars: vault.yml

- name: Create install directory
  file:
    path: /docker/{{ stack }}/bluesky
    state: directory
    owner: "{{ docker_user.name }}"
    mode: "{{ docker_compose_directory_mask }}"

- name: Install environment variable file
  template:
    src: files/bluesky.env
    dest: /docker/{{ stack }}/bluesky.env
    mode: "660"
    owner: "{{ docker_user.name }}"
  notify: restart bluesky

- name: Install compose file
  template:
    src: files/compose.yml
    dest: /docker/{{ stack }}/compose.yml
    mode: "{{ docker_compose_file_mask }}"
    owner: "{{ docker_user.name }}"
    validate: docker-compose -f %s config
  notify: restart bluesky