---
- name: Create atlas_cmms directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ atlas_cmms_data_dir }}"

- name: Deploy atlas_cmms compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ atlas_cmms_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart atlas_cmms

- name: Start atlas_cmms stack
  community.docker.docker_compose_v2:
    project_src: "{{ atlas_cmms_data_dir }}"
    state: present
