---
- name: Create homebox directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ homebox_data_dir }}"

- name: Deploy homebox compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ homebox_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart homebox

- name: Start homebox stack
  community.docker.docker_compose_v2:
    project_src: "{{ homebox_data_dir }}"
    state: present
