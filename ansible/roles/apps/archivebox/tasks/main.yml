---
- name: Create archivebox directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ archivebox_data_dir }}"

- name: Deploy archivebox compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ archivebox_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart archivebox

- name: Start archivebox stack
  community.docker.docker_compose_v2:
    project_src: "{{ archivebox_data_dir }}"
    state: present
