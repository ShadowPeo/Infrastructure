---
- name: Create actual_budget directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ actual_budget_data_dir }}"

- name: Deploy actual_budget compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ actual_budget_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart actual_budget

- name: Start actual_budget stack
  community.docker.docker_compose_v2:
    project_src: "{{ actual_budget_data_dir }}"
    state: present
