---
- name: Create semaphore directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ semaphore_data_dir }}"

- name: Deploy semaphore compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ semaphore_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart semaphore

- name: Start semaphore stack
  community.docker.docker_compose_v2:
    project_src: "{{ semaphore_data_dir }}"
    state: present
