---
- name: Create inventree directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ inventree_data_dir }}"

- name: Deploy inventree compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ inventree_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart inventree

- name: Start inventree stack
  community.docker.docker_compose_v2:
    project_src: "{{ inventree_data_dir }}"
    state: present
