---
- name: Create gramps directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ gramps_data_dir }}"

- name: Deploy gramps compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ gramps_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart gramps

- name: Start gramps stack
  community.docker.docker_compose_v2:
    project_src: "{{ gramps_data_dir }}"
    state: present
