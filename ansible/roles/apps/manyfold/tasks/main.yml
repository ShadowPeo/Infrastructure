---
- name: Create manyfold directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ manyfold_data_dir }}"

- name: Deploy manyfold compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ manyfold_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart manyfold

- name: Start manyfold stack
  community.docker.docker_compose_v2:
    project_src: "{{ manyfold_data_dir }}"
    state: present
