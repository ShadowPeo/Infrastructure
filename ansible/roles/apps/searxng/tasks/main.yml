---
- name: Create searxng directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ searxng_data_dir }}"

- name: Deploy searxng compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ searxng_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart searxng

- name: Start searxng stack
  community.docker.docker_compose_v2:
    project_src: "{{ searxng_data_dir }}"
    state: present
