---
- name: Create cardholder directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ cardholder_data_dir }}"

- name: Deploy cardholder compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ cardholder_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart cardholder

- name: Start cardholder stack
  community.docker.docker_compose_v2:
    project_src: "{{ cardholder_data_dir }}"
    state: present
