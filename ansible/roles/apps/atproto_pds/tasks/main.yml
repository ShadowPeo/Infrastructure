---
- name: Create atproto_pds directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ atproto_pds_data_dir }}"

- name: Deploy atproto_pds compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ atproto_pds_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart atproto_pds

- name: Start atproto_pds stack
  community.docker.docker_compose_v2:
    project_src: "{{ atproto_pds_data_dir }}"
    state: present
