---
- name: Create velld directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ velld_data_dir }}"

- name: Deploy velld compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ velld_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart velld

- name: Start velld stack
  community.docker.docker_compose_v2:
    project_src: "{{ velld_data_dir }}"
    state: present
