---
- name: Create pairdrop directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ pairdrop_data_dir }}"

- name: Deploy pairdrop compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ pairdrop_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart pairdrop

- name: Start pairdrop stack
  community.docker.docker_compose_v2:
    project_src: "{{ pairdrop_data_dir }}"
    state: present
