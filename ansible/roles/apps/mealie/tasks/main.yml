---
- name: Create mealie directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ mealie_data_dir }}"

- name: Deploy mealie compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ mealie_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart mealie

- name: Start mealie stack
  community.docker.docker_compose_v2:
    project_src: "{{ mealie_data_dir }}"
    state: present
