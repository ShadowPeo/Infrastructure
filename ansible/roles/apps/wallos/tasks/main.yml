---
- name: Create wallos directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ wallos_data_dir }}"

- name: Deploy wallos compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ wallos_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart wallos

- name: Start wallos stack
  community.docker.docker_compose_v2:
    project_src: "{{ wallos_data_dir }}"
    state: present
