---
- name: Create crowdsec directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ crowdsec_data_dir }}"

- name: Deploy crowdsec compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ crowdsec_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart crowdsec

- name: Start crowdsec stack
  community.docker.docker_compose_v2:
    project_src: "{{ crowdsec_data_dir }}"
    state: present
