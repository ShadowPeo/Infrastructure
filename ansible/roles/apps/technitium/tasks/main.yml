---
- name: Create technitium directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ technitium_data_dir }}"

- name: Deploy technitium compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ technitium_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart technitium

- name: Start technitium stack
  community.docker.docker_compose_v2:
    project_src: "{{ technitium_data_dir }}"
    state: present
