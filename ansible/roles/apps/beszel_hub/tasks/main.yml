---
- name: Create beszel_hub directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ beszel_hub_data_dir }}"

- name: Deploy beszel_hub compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ beszel_hub_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart beszel_hub

- name: Start beszel_hub stack
  community.docker.docker_compose_v2:
    project_src: "{{ beszel_hub_data_dir }}"
    state: present
