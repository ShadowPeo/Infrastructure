---
- name: Create lldap directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ lldap_data_dir }}"

- name: Deploy lldap compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ lldap_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart lldap

- name: Start lldap stack
  community.docker.docker_compose_v2:
    project_src: "{{ lldap_data_dir }}"
    state: present
