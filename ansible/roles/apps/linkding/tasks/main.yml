---
- name: Create linkding directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ linkding_data_dir }}"

- name: Deploy linkding compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ linkding_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart linkding

- name: Start linkding stack
  community.docker.docker_compose_v2:
    project_src: "{{ linkding_data_dir }}"
    state: present
