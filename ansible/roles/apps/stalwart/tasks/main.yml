---
- name: Create stalwart directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ stalwart_data_dir }}"

- name: Deploy stalwart compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ stalwart_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart stalwart

- name: Start stalwart stack
  community.docker.docker_compose_v2:
    project_src: "{{ stalwart_data_dir }}"
    state: present
