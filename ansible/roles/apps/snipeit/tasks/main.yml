---
- name: Create snipeit directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ snipeit_data_dir }}"

- name: Deploy snipeit compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ snipeit_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart snipeit

- name: Start snipeit stack
  community.docker.docker_compose_v2:
    project_src: "{{ snipeit_data_dir }}"
    state: present
