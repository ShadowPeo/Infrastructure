---
- name: Create wordpress directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ wordpress_data_dir }}"

- name: Deploy wordpress compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ wordpress_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart wordpress

- name: Start wordpress stack
  community.docker.docker_compose_v2:
    project_src: "{{ wordpress_data_dir }}"
    state: present
