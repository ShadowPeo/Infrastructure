---
- name: Create paperless service user
  ansible.builtin.import_tasks: roles/common/tasks/create_service_user.yml
  vars:
    service_name: paperless
    service_uid: "{{ paperless_uid }}"

- name: Create paperless bind-mount directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: paperless
    group: ACL_DOCKER_DATA_ADMIN
    mode: "2775"  # setgid — new files inherit ACL_DOCKER_DATA_ADMIN group
  loop:
    - { path: "{{ paperless_data_dir }}/consume" }
    - { path: "{{ paperless_data_dir }}/export" }
    - { path: "{{ paperless_data_dir }}/media" }

- name: Deploy paperless compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ paperless_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart paperless

- name: Start paperless stack
  community.docker.docker_compose_v2:
    project_src: "{{ paperless_data_dir }}"
    state: present
