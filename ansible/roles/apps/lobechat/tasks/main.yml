---
- name: Create lobechat directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ lobechat_data_dir }}"

- name: Deploy lobechat compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ lobechat_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart lobechat

- name: Start lobechat stack
  community.docker.docker_compose_v2:
    project_src: "{{ lobechat_data_dir }}"
    state: present
