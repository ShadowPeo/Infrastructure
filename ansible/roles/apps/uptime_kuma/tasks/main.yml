---
- name: Create uptime_kuma directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ uptime_kuma_data_dir }}"

- name: Deploy uptime_kuma compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ uptime_kuma_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart uptime_kuma

- name: Start uptime_kuma stack
  community.docker.docker_compose_v2:
    project_src: "{{ uptime_kuma_data_dir }}"
    state: present
