---
- name: Create healthchecks directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ healthchecks_data_dir }}"

- name: Deploy healthchecks compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ healthchecks_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart healthchecks

- name: Start healthchecks stack
  community.docker.docker_compose_v2:
    project_src: "{{ healthchecks_data_dir }}"
    state: present
