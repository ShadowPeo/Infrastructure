---
- name: Create directus directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ directus_data_dir }}"

- name: Deploy directus compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ directus_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart directus

- name: Start directus stack
  community.docker.docker_compose_v2:
    project_src: "{{ directus_data_dir }}"
    state: present
