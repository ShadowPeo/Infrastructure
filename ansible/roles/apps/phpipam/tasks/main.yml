---
- name: Create phpipam directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ phpipam_data_dir }}"

- name: Deploy phpipam compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ phpipam_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart phpipam

- name: Start phpipam stack
  community.docker.docker_compose_v2:
    project_src: "{{ phpipam_data_dir }}"
    state: present
