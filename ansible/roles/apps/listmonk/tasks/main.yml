---
- name: Create listmonk directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ listmonk_data_dir }}"

- name: Deploy listmonk compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ listmonk_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart listmonk

- name: Start listmonk stack
  community.docker.docker_compose_v2:
    project_src: "{{ listmonk_data_dir }}"
    state: present
