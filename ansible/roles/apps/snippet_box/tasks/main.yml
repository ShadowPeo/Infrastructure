---
- name: Create snippet_box directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ snippet_box_data_dir }}"

- name: Deploy snippet_box compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ snippet_box_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart snippet_box

- name: Start snippet_box stack
  community.docker.docker_compose_v2:
    project_src: "{{ snippet_box_data_dir }}"
    state: present
