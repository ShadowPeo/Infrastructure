---
- name: Create documize directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ documize_data_dir }}"

- name: Deploy documize compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ documize_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart documize

- name: Start documize stack
  community.docker.docker_compose_v2:
    project_src: "{{ documize_data_dir }}"
    state: present
