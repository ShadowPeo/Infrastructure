---
- name: Create flame directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0755"
  loop:
    - "{{ flame_data_dir }}"
    - "{{ flame_data_dir }}/{{ flame_instance if flame_instance else 'data' }}"

- name: Deploy flame compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ flame_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart flame

- name: Start flame stack
  community.docker.docker_compose_v2:
    project_src: "{{ flame_data_dir }}"
    state: present
