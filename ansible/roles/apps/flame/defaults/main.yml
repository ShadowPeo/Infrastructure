---
flame_image_version: latest
flame_data_dir: "{{ docker_root }}/flame"

# Optional: set to a subdir name when running multiple instances on the same host
# (e.g. flame_instance: ICT → data lives at flame_data_dir/ICT)
# If unset, data lives at flame_data_dir/data
flame_instance: ""

flame_container_name: Flame
flame_network: Public
flame_router_name: flame
flame_traefik_tls: false
flame_traefik_middlewares: []
