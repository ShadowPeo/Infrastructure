---
- name: Create postiz directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ postiz_data_dir }}"

- name: Deploy postiz compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ postiz_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart postiz

- name: Start postiz stack
  community.docker.docker_compose_v2:
    project_src: "{{ postiz_data_dir }}"
    state: present
