---
- name: Create adminer directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ adminer_data_dir }}"

- name: Deploy adminer compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ adminer_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart adminer

- name: Start adminer stack
  community.docker.docker_compose_v2:
    project_src: "{{ adminer_data_dir }}"
    state: present
