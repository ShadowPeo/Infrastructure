---
- name: Create codeserver directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ codeserver_data_dir }}"

- name: Deploy codeserver compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ codeserver_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart codeserver

- name: Start codeserver stack
  community.docker.docker_compose_v2:
    project_src: "{{ codeserver_data_dir }}"
    state: present
