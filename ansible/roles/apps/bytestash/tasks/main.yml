---
- name: Create bytestash directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ bytestash_data_dir }}"

- name: Deploy bytestash compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ bytestash_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart bytestash

- name: Start bytestash stack
  community.docker.docker_compose_v2:
    project_src: "{{ bytestash_data_dir }}"
    state: present
