---
- name: Create linkstack directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ linkstack_data_dir }}"

- name: Deploy linkstack compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ linkstack_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart linkstack

- name: Start linkstack stack
  community.docker.docker_compose_v2:
    project_src: "{{ linkstack_data_dir }}"
    state: present
