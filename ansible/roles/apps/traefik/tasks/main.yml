---
- name: Create traefik directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ traefik_data_dir }}"

- name: Deploy traefik compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ traefik_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart traefik

- name: Start traefik stack
  community.docker.docker_compose_v2:
    project_src: "{{ traefik_data_dir }}"
    state: present
