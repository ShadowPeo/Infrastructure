---
- name: Create affine directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ affine_data_dir }}"

- name: Deploy affine compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ affine_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart affine

- name: Start affine stack
  community.docker.docker_compose_v2:
    project_src: "{{ affine_data_dir }}"
    state: present
