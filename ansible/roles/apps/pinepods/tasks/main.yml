---
- name: Create pinepods directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ pinepods_data_dir }}"

- name: Deploy pinepods compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ pinepods_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart pinepods

- name: Start pinepods stack
  community.docker.docker_compose_v2:
    project_src: "{{ pinepods_data_dir }}"
    state: present
