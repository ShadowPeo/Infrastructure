---
- name: Create dozzle directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ dozzle_data_dir }}"

- name: Deploy dozzle compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ dozzle_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart dozzle

- name: Start dozzle stack
  community.docker.docker_compose_v2:
    project_src: "{{ dozzle_data_dir }}"
    state: present
