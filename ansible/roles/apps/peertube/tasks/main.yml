---
- name: Create peertube directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ peertube_data_dir }}"

- name: Deploy peertube compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ peertube_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart peertube

- name: Start peertube stack
  community.docker.docker_compose_v2:
    project_src: "{{ peertube_data_dir }}"
    state: present
