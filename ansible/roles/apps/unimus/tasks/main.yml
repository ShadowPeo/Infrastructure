---
- name: Create unimus directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ unimus_data_dir }}"

- name: Deploy unimus compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ unimus_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart unimus

- name: Start unimus stack
  community.docker.docker_compose_v2:
    project_src: "{{ unimus_data_dir }}"
    state: present
