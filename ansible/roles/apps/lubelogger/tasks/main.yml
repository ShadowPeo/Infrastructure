---
- name: Create lubelogger directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ lubelogger_data_dir }}"

- name: Deploy lubelogger compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ lubelogger_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart lubelogger

- name: Start lubelogger stack
  community.docker.docker_compose_v2:
    project_src: "{{ lubelogger_data_dir }}"
    state: present
