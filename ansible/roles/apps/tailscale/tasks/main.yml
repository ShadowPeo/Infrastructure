---
- name: Create tailscale directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - "{{ tailscale_data_dir }}"

- name: Deploy tailscale compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ tailscale_data_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  notify: restart tailscale

- name: Start tailscale stack
  community.docker.docker_compose_v2:
    project_src: "{{ tailscale_data_dir }}"
    state: present
